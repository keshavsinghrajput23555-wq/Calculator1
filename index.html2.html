<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(255,80,0,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,200,0,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .calculator {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 24px;
      padding: 28px 24px 24px;
      width: 340px;
      box-shadow: 
        0 0 0 1px #1a1a1a,
        0 40px 80px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .display {
      background: #0a0a0a;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      padding: 20px 20px 14px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .display::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,120,0,0.4), transparent);
    }

    .expression {
      font-size: 13px;
      color: #444;
      min-height: 18px;
      letter-spacing: 0.5px;
      word-break: break-all;
    }

    .result {
      font-family: 'Bebas Neue', cursive;
      font-size: 54px;
      color: #fff;
      letter-spacing: 2px;
      line-height: 1;
      transition: color 0.15s;
      word-break: break-all;
    }

    .result.error { color: #ff4444; font-size: 28px; }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 68px;
      border: none;
      border-radius: 14px;
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.08s, box-shadow 0.08s, background 0.1s;
      position: relative;
      overflow: hidden;
      outline: none;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      background: rgba(255,255,255,0.1);
      transition: opacity 0.1s;
    }

    button:hover::after { opacity: 1; }
    button:active { transform: scale(0.93); }

    /* Number buttons */
    .btn-num {
      background: #1c1c1c;
      color: #e8e8e8;
      border: 1px solid #2a2a2a;
      box-shadow: 0 2px 0 #111, inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .btn-num:hover { background: #242424; }

    /* Operator buttons */
    .btn-op {
      background: #1e1810;
      color: #ff8c00;
      border: 1px solid #2d2010;
      box-shadow: 0 2px 0 #111, inset 0 1px 0 rgba(255,140,0,0.08);
    }
    .btn-op:hover { background: #252015; }

    /* Special buttons (AC, +/-, %) */
    .btn-special {
      background: #1a1a1a;
      color: #888;
      border: 1px solid #252525;
      box-shadow: 0 2px 0 #111;
    }
    .btn-special:hover { background: #222; color: #aaa; }

    /* Equals button */
    .btn-eq {
      background: linear-gradient(135deg, #ff6a00, #ff9500);
      color: #fff;
      border: none;
      font-size: 24px;
      box-shadow: 0 4px 0 #993d00, 0 6px 20px rgba(255,100,0,0.3);
    }
    .btn-eq:hover { background: linear-gradient(135deg, #ff7800, #ffaa00); }
    .btn-eq:active { transform: scale(0.93); box-shadow: 0 1px 0 #993d00; }

    /* Zero button spans 2 cols */
    .btn-zero {
      grid-column: span 2;
      border-radius: 14px;
      text-align: left;
      padding-left: 26px;
    }

    /* Ripple effect */
    .ripple {
      position: absolute;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.12);
      transform: scale(0);
      animation: rippleAnim 0.4s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(3); opacity: 0; }
    }

    .label {
      font-family: 'Bebas Neue', cursive;
      letter-spacing: 4px;
      font-size: 11px;
      color: #333;
      text-align: center;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="label">CALCULATOR</div>
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-special" onclick="clearAll()">AC</button>
      <button class="btn-special" onclick="toggleSign()">+/−</button>
      <button class="btn-special" onclick="percent()">%</button>
      <button class="btn-op" onclick="inputOp('/')">÷</button>

      <button class="btn-num" onclick="inputNum('7')">7</button>
      <button class="btn-num" onclick="inputNum('8')">8</button>
      <button class="btn-num" onclick="inputNum('9')">9</button>
      <button class="btn-op" onclick="inputOp('*')">×</button>

      <button class="btn-num" onclick="inputNum('4')">4</button>
      <button class="btn-num" onclick="inputNum('5')">5</button>
      <button class="btn-num" onclick="inputNum('6')">6</button>
      <button class="btn-op" onclick="inputOp('-')">−</button>

      <button class="btn-num" onclick="inputNum('1')">1</button>
      <button class="btn-num" onclick="inputNum('2')">2</button>
      <button class="btn-num" onclick="inputNum('3')">3</button>
      <button class="btn-op" onclick="inputOp('+')">+</button>

      <button class="btn-num btn-zero" onclick="inputNum('0')">0</button>
      <button class="btn-num" onclick="inputDot()">.</button>
      <button class="btn-eq" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let expression = '';
    let justCalc = false;

    const display = document.getElementById('result');
    const exprEl = document.getElementById('expression');

    function updateDisplay(val) {
      let v = String(val);
      display.classList.remove('error');
      // Trim long decimals
      if (v.includes('.') && !v.includes('e')) {
        let [int, dec] = v.split('.');
        if (dec && dec.length > 9) v = parseFloat(val).toPrecision(10).replace(/\.?0+$/, '');
      }
      display.style.fontSize = v.length > 12 ? '30px' : v.length > 8 ? '42px' : '54px';
      display.textContent = v;
    }

    function inputNum(n) {
      addRipple(event);
      if (justCalc) { current = n; expression = ''; justCalc = false; }
      else if (current === '0') current = n;
      else current += n;
      updateDisplay(current);
    }

    function inputDot() {
      addRipple(event);
      if (justCalc) { current = '0.'; justCalc = false; }
      else if (!current.includes('.')) current += '.';
      updateDisplay(current);
    }

    function inputOp(op) {
      addRipple(event);
      justCalc = false;
      const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      // Replace trailing operator
      expression = expression.replace(/[\+\-\*\/]$/, '');
      expression += current + op;
      current = '0';
      exprEl.textContent = expression.replace(/\*/g,'×').replace(/\//g,'÷').replace(/-/g,'−');
      updateDisplay('0');
    }

    function calculate() {
      addRipple(event);
      if (!expression) return;
      try {
        const full = expression + current;
        let result = Function('"use strict"; return (' + full + ')')();
        exprEl.textContent = full.replace(/\*/g,'×').replace(/\//g,'÷').replace(/-/g,'−') + '=';
        if (!isFinite(result)) throw new Error('Error');
        current = String(parseFloat(result.toPrecision(12)));
        expression = '';
        justCalc = true;
        updateDisplay(current);
      } catch (e) {
        display.classList.add('error');
        display.textContent = 'Error';
        display.style.fontSize = '28px';
      }
    }

    function clearAll() {
      addRipple(event);
      current = '0'; expression = ''; justCalc = false;
      exprEl.textContent = '';
      updateDisplay('0');
    }

    function toggleSign() {
      addRipple(event);
      current = String(parseFloat(current) * -1);
      updateDisplay(current);
    }

    function percent() {
      addRipple(event);
      current = String(parseFloat(current) / 100);
      updateDisplay(current);
    }

    function addRipple(e) {
      if (!e || !e.currentTarget) return;
      const btn = e.currentTarget;
      const r = document.createElement('span');
      r.className = 'ripple';
      btn.appendChild(r);
      setTimeout(() => r.remove(), 400);
    }

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') inputNum(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') inputOp('+');
      else if (e.key === '-') inputOp('-');
      else if (e.key === '*') inputOp('*');
      else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === '%') percent();
      else if (e.key === 'Backspace') {
        if (current.length > 1) current = current.slice(0, -1);
        else current = '0';
        updateDisplay(current);
      }
    });
  </script>
</body>
</html>
